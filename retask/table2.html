<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table2</title>
    <style>
        table {
            border: 1px solid black;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th colspan="2">Jobs</th>
                <th>Working Experience</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>Software Engineer</td>
                <td>Data Analyst</td>
                <td rowspan="2">5 Years</td>
            </tr>
            <tr>
                <td>Ale</td>
                <td colspan="2">Senior Web Developer</td>
            </tr>
            <tr>
                <td>Jack</td>
                <td>Junior Tech Writer</td>
                <td>Blogger</td>
                <td>6 Months</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Total</td>
                <td colspan="1">5Years 6 Months</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
