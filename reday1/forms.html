<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>

        .input-form {
            position: relative;
            margin-bottom: 20px;
        }

        .input-form input {
            padding: 12px;
            border-radius: 10px;
        }

        .input-form label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background-color: white;
            padding: 2px;
        }

        .input-form input:focus+label,
        .input-form input:not(:placeholder-shown)+label {
            top: 0;
        }

        .input-form input:invalid:not(:placeholder-shown) {
            outline: none;
            border: 1px solid red;
        }

    </style>
</head>

<body>

    <div class="input-form">
        <input id="name" type="text" name="userName" pattern="[A-Za-z]{3,}" placeholder=" " required>
        <label for="name">Full Name</label>
    </div>

</body>

</html>
