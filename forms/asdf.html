<!DOCTYPE html>
<html>

<head>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        td,
        th {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        col:first-child {
            background-color: lightgray;
        }

        col:nth-child(2) {
            background-color: lightblue;
        }

        col:nth-child(3) {
            background-color: cyan;
        }

        .input-form {
            position: relative;
        }

        .input-form input {
            padding: 20px;
        }

        .input-form label {
            position: absolute;
            top: 60%;
            left: 20px;
            transform: translateY(-50%);
        }

        .input-form input:focus+label,
        .input-form input:not(:placeholder-shown)+label {
            top: 0;
            background-color: white;
        }

        .input-form input:invalid:not(:placeholder-shown) {
            background-color: rgb(197, 131, 131);
        }
    </style>
</head>
