<!DOCTYPE html>
<html>

<head>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        td,
        th {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        col:first-child {
            background-color: lightgray;
        }

        col:nth-child(2) {
            background-color: lightblue;
        }

        col:nth-child(3) {
            background-color: cyan;
        }
    </style>
</head>

<body>
    <table>
        <colgroup>
            <col>
            <col>
            <col>
        </colgroup>
        <tr>
            <th>Name</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Jai</td>
            <td>90</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Arun</td>
            <td>85</td>
            <td>B+</td>
        </tr>
    </table>
</body>

</html>
